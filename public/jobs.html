<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Board | Alumni Connect</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="main-navbar"></nav>

  <main class="container">
    <div class="section-title">
      <h2>Job & Internship Opportunities</h2>
      <p style="color:var(--text-muted);">Explore vacancies posted by our alumni community for freshers and student interns.</p>
    </div>

    <!-- Post Job Section (For Alumni/Admin) -->
    <section id="post-job-section" class="form-card" style="display: none; margin-bottom: 3rem; max-width: 100%;">
      <h3 style="border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1.5rem;">
        Post a Job or Internship
      </h3>
      <form id="job-post-form" onsubmit="submitJobPost(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="job-title">Job Title</label>
            <input type="text" id="job-title" class="form-control" placeholder="e.g. Frontend Developer Intern" required>
          </div>
          <div class="form-group">
            <label for="job-company">Company Name</label>
            <input type="text" id="job-company" class="form-control" placeholder="e.g. Zoho" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="job-location">Location</label>
            <input type="text" id="job-location" class="form-control" placeholder="e.g. Chennai / Remote" required>
          </div>
          <div class="form-group">
            <label for="job-type">Job Type</label>
            <select id="job-type" class="form-control" required>
              <option value="Internship">Internship</option>
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Remote">Remote</option>
              <option value="Contract">Contract</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="job-duration">Duration / Term</label>
          <input type="text" id="job-duration" class="form-control" placeholder="e.g. 3 months / Permanent">
        </div>

        <div class="form-group">
          <label for="job-description">Role Description & Requirements</label>
          <textarea id="job-description" class="form-control" rows="5" placeholder="Outline the job responsibilities, required skills, and application instructions..." required></textarea>
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary">Post Opportunity</button>
          <button type="button" class="btn btn-secondary" onclick="hideJobForm()" style="color:var(--text-dark); border-color:var(--border-color);">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Top Bar actions -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
      <div style="display: flex; gap: 0.5rem; flex-grow: 1; max-width: 500px;">
        <input type="text" id="search-job" class="form-control" placeholder="Search by title, company, or location..." oninput="loadJobs()">
      </div>
      <button id="post-job-btn" class="btn btn-primary" onclick="showJobForm()" style="display: none;">
        <i class="fa-solid fa-plus"></i> Post an Opportunity
      </button>
    </div>

    <!-- Jobs Grid/List -->
    <section style="display: flex; flex-direction: column; gap: 1.5rem;" id="jobs-list-container">
      <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
        Loading job openings...
      </div>
    </section>
  </main>

  <footer style="background-color: var(--primary-dark); color: white; padding: 2.5rem; text-align: center; border-top: 4px solid var(--accent-color); margin-top: 4rem;">
    <p>&copy; 2026 VSB Engineering College - ECE Department. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const user = getUser();

    document.addEventListener('DOMContentLoaded', () => {
      loadJobs();
      if (user && (user.role === 'alumni' || user.role === 'admin')) {
        document.getElementById('post-job-btn').style.display = 'block';
      }
    });

    async function loadJobs() {
      const search = document.getElementById('search-job').value.toLowerCase();
      const container = document.getElementById('jobs-list-container');

      try {
        const jobs = await apiCall('/jobs');
        
        const filtered = jobs.filter(j => {
          return j.title.toLowerCase().includes(search) ||
                 j.company.toLowerCase().includes(search) ||
                 j.location.toLowerCase().includes(search) ||
                 j.type.toLowerCase().includes(search);
        });

        if (filtered.length === 0) {
          container.innerHTML = `
            <div style="text-align: center; padding: 3rem; background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-soft);">
              <i class="fa-solid fa-briefcase" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
              <p style="color: var(--text-muted);">No job listings match your query.</p>
            </div>
          `;
          return;
        }

        container.innerHTML = filtered.map(j => {
          const deleteBtn = user && (user.id === j.poster_id || user.role === 'admin')
            ? `<button class="btn btn-danger" onclick="deleteJob(${j.id})" style="padding: 0.35rem 0.75rem; font-size: 0.8rem; border:none;"><i class="fa-solid fa-trash"></i> Delete Post</button>`
            : '';
          
          return `
            <div style="background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-soft); border: 1px solid var(--border-color); padding: 2rem; display: flex; flex-direction: column; gap: 1rem; border-left: 5px solid var(--primary-color);">
              <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
                <div>
                  <h3 style="font-size: 1.4rem; color: var(--primary-color); margin-bottom: 0.25rem;">${j.title}</h3>
                  <div style="display: flex; gap: 1rem; flex-wrap: wrap; font-size: 0.9rem; color: var(--text-muted);">
                    <span><i class="fa-solid fa-building" style="color:var(--accent-color);"></i> ${j.company}</span>
                    <span><i class="fa-solid fa-location-dot" style="color:var(--accent-color);"></i> ${j.location}</span>
                    <span><i class="fa-solid fa-clock" style="color:var(--accent-color);"></i> ${j.type}</span>
                    ${j.duration ? `<span><i class="fa-solid fa-calendar" style="color:var(--accent-color);"></i> ${j.duration}</span>` : ''}
                  </div>
                </div>
                <div style="display:flex; align-items:center; gap:0.5rem;">
                  ${deleteBtn}
                </div>
              </div>

              <p style="white-space: pre-line; color: var(--text-dark); font-size: 0.95rem; line-height: 1.6; border-top: 1px solid #edf2f7; padding-top: 1rem;">
                ${j.description}
              </p>

              <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #edf2f7; padding-top: 1rem; margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-muted); flex-wrap: wrap; gap: 0.5rem;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                  <img src="${j.poster_photo}" style="width: 25px; height: 25px; border-radius: 50%; object-fit: cover;">
                  <span>Posted by <strong style="color: var(--primary-color);">${j.poster_name}</strong> (${j.poster_company})</span>
                </div>
                <span>Date: ${new Date(j.created_at).toLocaleDateString()}</span>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        container.innerHTML = `<div style="text-align: center; padding: 3rem; color: #e53e3e;">${err.message}</div>`;
      }
    }

    function showJobForm() {
      document.getElementById('post-job-section').style.display = 'block';
      document.getElementById('job-title').focus();
      document.getElementById('post-job-section').scrollIntoView({ behavior: 'smooth' });
    }

    function hideJobForm() {
      document.getElementById('post-job-section').style.display = 'none';
      document.getElementById('job-post-form').reset();
    }

    async function submitJobPost(event) {
      event.preventDefault();
      const title = document.getElementById('job-title').value;
      const company = document.getElementById('job-company').value;
      const location = document.getElementById('job-location').value;
      const type = document.getElementById('job-type').value;
      const duration = document.getElementById('job-duration').value;
      const description = document.getElementById('job-description').value;

      try {
        await apiCall('/jobs', {
          method: 'POST',
          body: JSON.stringify({ title, company, location, type, duration, description })
        });

        showToast('Job opportunity posted successfully!');
        hideJobForm();
        loadJobs();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteJob(id) {
      if (!confirm('Are you sure you want to delete this job posting?')) return;
      try {
        await apiCall(`/jobs/${id}`, { method: 'DELETE' });
        showToast('Job listing deleted successfully.');
        loadJobs();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
  </script>
</body>
</html>
