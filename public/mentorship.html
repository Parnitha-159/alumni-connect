<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Mentor | Alumni Connect</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="main-navbar"></nav>

  <main class="container">
    <div class="section-title">
      <h2>Alumni-Student Mentorship Matching</h2>
      <p style="color:var(--text-muted);">Connect directly with VSB Engineering graduates who have volunteered to guide current students.</p>
    </div>

    <!-- Request Form Section (Only visible when requesting a specific mentor) -->
    <section id="mentorship-request-section" class="form-card" style="display: none; margin-bottom: 3rem; max-width: 100%;">
      <h3 style="border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1.5rem;" id="request-title">
        Send Mentorship Request
      </h3>
      <form id="mentor-req-form" onsubmit="submitMentorshipRequest(event)">
        <input type="hidden" id="req-mentor-id">
        <div class="form-group">
          <label for="req-message">Introduction & Request Message</label>
          <textarea id="req-message" class="form-control" rows="5" placeholder="e.g. Hello, I am a 3rd year ECE student interested in embedded firmware. I would love your guidance on what skillsets to develop and key projects to target..." required></textarea>
        </div>
        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary">Send Request</button>
          <button type="button" class="btn btn-secondary" onclick="hideRequestForm()" style="color:var(--text-dark); border-color:var(--border-color);">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Mentors Directory / Search Section -->
    <section>
      <div class="filters-bar" style="margin-bottom: 2rem;">
        <div class="filter-group" style="flex:2;">
          <label for="search-domain" style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.35rem; color:var(--primary-color);">Search Expertise/Domain</label>
          <input type="text" id="search-domain" class="form-control" placeholder="e.g. Web Development, VLSI, Embedded Systems, Germany" oninput="loadMentors()">
        </div>
        <button class="btn btn-teal" onclick="resetMentorSearch()">Reset Search</button>
      </div>

      <div class="card-grid" id="mentors-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">
          Loading mentors...
        </div>
      </div>
    </section>
  </main>

  <footer style="background-color: var(--primary-dark); color: white; padding: 2.5rem; text-align: center; border-top: 4px solid var(--accent-color); margin-top: 4rem;">
    <p>&copy; 2026 VSB Engineering College - ECE Department. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const targetMentorId = params.get('request');
    const targetMentorName = params.get('name');

    document.addEventListener('DOMContentLoaded', () => {
      // If student is redirected to send request immediately
      if (targetMentorId && targetMentorName) {
        showRequestForm(targetMentorId, targetMentorName);
      }
      loadMentors();
    });

    async function loadMentors() {
      const search = document.getElementById('search-domain').value.toLowerCase();
      const grid = document.getElementById('mentors-grid');

      try {
        // Fetch all alumni, filter on client (since alumni list is relatively small)
        const alumni = await apiCall('/alumni?mentor_only=true');
        
        // Filter by expertise search keyword
        const filtered = alumni.filter(a => {
          return a.name.toLowerCase().includes(search) ||
                 (a.mentor_expertise || '').toLowerCase().includes(search) ||
                 (a.current_company || '').toLowerCase().includes(search) ||
                 (a.current_role || '').toLowerCase().includes(search);
        });

        if (filtered.length === 0) {
          grid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem; background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-soft);">
              <i class="fa-solid fa-graduation-cap" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
              <p style="color: var(--text-muted);">No mentors match your search query.</p>
            </div>
          `;
          return;
        }

        grid.innerHTML = filtered.map(m => `
          <div class="card">
            <div class="card-header-photo" style="background-image: url('${m.profile_photo || '/images/default-avatar.png'}')">
              <span class="card-badge"><i class="fa-solid fa-star"></i> Mentor</span>
            </div>
            <div class="card-body">
              <h3>${m.name}</h3>
              <div class="card-subtitle">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>Class of ${m.batch_year} &bull; ${m.department}</span>
              </div>
              <p class="card-text">
                <i class="fa-solid fa-briefcase" style="color: var(--accent-color); margin-right: 0.5rem;"></i>
                <strong>${m.current_role || 'Alumnus'}</strong> at ${m.current_company || 'Independent'}
              </p>
              
              <div style="background: rgba(15, 76, 76, 0.05); padding: 0.75rem; border-radius: 6px; border-left: 3px solid var(--primary-color); margin-bottom: 1rem; margin-top: auto;">
                <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--primary-color); display: block; margin-bottom: 0.25rem;">Expertise Domain</span>
                <span style="font-size: 0.9rem; font-weight: 600; color: var(--text-dark);">${m.mentor_expertise || 'General Career Guidance'}</span>
              </div>

              <p class="card-text" style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;">
                ${m.bio ? m.bio.substring(0, 100) + '...' : 'No bio provided.'}
              </p>
            </div>
            <div class="card-footer" style="gap: 0.5rem;">
              <a href="/profile.html?id=${m.user_id}" class="btn btn-secondary" style="flex:1; font-size:0.8rem; padding:0.4rem; color:var(--primary-color); border-color:var(--primary-color);">View Profile</a>
              <button onclick="showRequestForm(${m.user_id}, '${m.name}')" class="btn btn-teal" style="flex:1.5; font-size:0.8rem; padding:0.4rem;">
                Request Guidance
              </button>
            </div>
          </div>
        `).join('');

      } catch (err) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #e53e3e;">${err.message}</div>`;
      }
    }

    function showRequestForm(mentorId, name) {
      document.getElementById('mentorship-request-section').style.display = 'block';
      document.getElementById('req-mentor-id').value = mentorId;
      document.getElementById('request-title').innerHTML = `Send Mentorship Request to <strong style="color:var(--accent-color);">${name}</strong>`;
      document.getElementById('req-message').focus();
      // Scroll to form
      document.getElementById('mentorship-request-section').scrollIntoView({ behavior: 'smooth' });
    }

    function hideRequestForm() {
      document.getElementById('mentorship-request-section').style.display = 'none';
      document.getElementById('mentor-req-form').reset();
    }

    async function submitMentorshipRequest(event) {
      event.preventDefault();
      const mentor_id = parseInt(document.getElementById('req-mentor-id').value);
      const request_message = document.getElementById('req-message').value;

      try {
        await apiCall('/mentorship/request', {
          method: 'POST',
          body: JSON.stringify({ mentor_id, request_message })
        });

        showToast('Mentorship request sent successfully!');
        hideRequestForm();
        
        // Redirect to dashboard to check status in 1.5 seconds
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1500);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function resetMentorSearch() {
      document.getElementById('search-domain').value = '';
      loadMentors();
    }
  </script>
</body>
</html>
