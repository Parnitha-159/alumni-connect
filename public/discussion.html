<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discussion Board | Alumni Connect</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="main-navbar"></nav>

  <main class="container">
    <div class="section-title">
      <h2>Campus Discussion & Announcements</h2>
      <p style="color:var(--text-muted);">Share announcements, discuss placement questions, or ask questions about higher studies.</p>
    </div>

    <!-- Create Post Section -->
    <section class="form-card" style="margin: 0 0 3rem; max-width: 100%;">
      <h3 style="border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1.5rem;">
        Start a New Discussion Thread
      </h3>
      <form id="discussion-form" onsubmit="submitDiscussionThread(event)">
        <div class="form-group">
          <label for="disc-title">Topic / Title</label>
          <input type="text" id="disc-title" class="form-control" placeholder="e.g. Tips for cracking the Qualcomm interview?" required>
        </div>
        <div class="form-group">
          <label for="disc-content">Details / Message</label>
          <textarea id="disc-content" class="form-control" rows="4" placeholder="Detail your query or post here..." required></textarea>
        </div>
        <button type="submit" class="btn btn-teal">Post to Board</button>
      </form>
    </section>

    <!-- Discussions List -->
    <section id="threads-container" style="display: flex; flex-direction: column;">
      <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
        Loading discussions...
      </div>
    </section>
  </main>

  <footer style="background-color: var(--primary-dark); color: white; padding: 2.5rem; text-align: center; border-top: 4px solid var(--accent-color); margin-top: 4rem;">
    <p>&copy; 2026 VSB Engineering College - ECE Department. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const user = getUser();

    document.addEventListener('DOMContentLoaded', () => {
      loadDiscussions();
    });

    async function loadDiscussions() {
      const container = document.getElementById('threads-container');

      try {
        const threads = await apiCall('/discussion');
        
        if (threads.length === 0) {
          container.innerHTML = `
            <div style="text-align: center; padding: 3rem; background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-soft);">
              <i class="fa-solid fa-comments" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
              <p style="color: var(--text-muted);">No discussions posted yet. Be the first to start a conversation!</p>
            </div>
          `;
          return;
        }

        container.innerHTML = threads.map(t => {
          const deleteBtn = user && (user.id === t.user_id || user.role === 'admin')
            ? `<button class="btn btn-danger" onclick="deleteThread(${t.id})" style="padding:0.25rem 0.6rem; font-size:0.75rem; border:none; margin-top: 0.5rem;"><i class="fa-solid fa-trash"></i> Delete</button>`
            : '';
          
          let roleBadgeClass = 'role-student';
          if (t.user_role === 'admin') roleBadgeClass = 'role-admin';
          if (t.user_role === 'alumni') roleBadgeClass = 'role-alumni'; // custom styling

          const roleDisplay = t.user_role.toUpperCase();

          return `
            <div class="thread-card">
              <div class="thread-header">
                <div style="display:flex; align-items:center; gap:0.5rem;">
                  <span class="thread-user-badge ${roleBadgeClass}">${roleDisplay}</span>
                  <strong style="color:var(--primary-color);">${t.user_name}</strong>
                </div>
                <span>${new Date(t.created_at).toLocaleString()}</span>
              </div>
              <h3 style="font-size: 1.25rem; color: var(--primary-dark); margin-bottom: 0.5rem;">${t.title}</h3>
              <p style="white-space: pre-line; color: var(--text-dark); line-height: 1.6; font-size: 0.95rem;">
                ${t.content}
              </p>
              <div style="display:flex; justify-content:flex-end;">
                ${deleteBtn}
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        container.innerHTML = `<div style="text-align: center; padding: 3rem; color: #e53e3e;">${err.message}</div>`;
      }
    }

    async function submitDiscussionThread(event) {
      event.preventDefault();
      const title = document.getElementById('disc-title').value;
      const content = document.getElementById('disc-content').value;

      try {
        await apiCall('/discussion', {
          method: 'POST',
          body: JSON.stringify({ title, content })
        });

        showToast('Discussion thread posted successfully!');
        document.getElementById('discussion-form').reset();
        loadDiscussions();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteThread(id) {
      if (!confirm('Are you sure you want to delete this thread?')) return;
      try {
        await apiCall(`/discussion/${id}`, { method: 'DELETE' });
        showToast('Thread deleted successfully.');
        loadDiscussions();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
  </script>
</body>
</html>
